<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>撥雲見月 - 真實圖片版 Sample</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f2ee;
      /* 使用 subpages 的背景色 */
      font-family: 'Noto Serif TC', serif;
    }

    /* 模擬的首頁內容 */
    .homepage-mock {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #ffffff 0%, #f4f2ee 100%);
      color: #12151a;

      /* 初始狀態：模糊且稍微暗一點 */
      filter: blur(15px) brightness(0.7);
      transform: scale(1.05);
      transition: filter 4s cubic-bezier(0.3, 0, 0.2, 1), transform 4s cubic-bezier(0.3, 0, 0.2, 1);
    }

    .homepage-mock h1 {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .homepage-mock p {
      font-size: 1.2rem;
      color: #8a8278;
    }

    /* 雲霧容器 */
    .clouds-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* 單片雲霧，替換成真實圖片 */
    .cloud {
      position: absolute;
      background-size: cover;
      /* 讓圖片填滿指定的區域 */
      background-position: center;
      background-repeat: no-repeat;
      /* 放慢動畫至 4 秒，讓雲氣散開更有史詩感 */
      transition: transform 4s cubic-bezier(0.3, 0, 0.2, 1), opacity 4s cubic-bezier(0.3, 0, 0.2, 1);
    }

    /* 佈置 4 片雲，分別套用 fog_1 ~ fog_3，第四片重複使用並翻轉 */
    .cloud-1 {
      top: -20%;
      left: -20%;
      width: 80%;
      height: 80%;
      background-image: url('assets/fog_4.png');
      opacity: 0.95;
    }

    .cloud-2 {
      top: -20%;
      right: -20%;
      width: 80%;
      height: 80%;
      background-image: url('assets/fog_2.png');
      opacity: 0.85;
      /* 鏡像翻轉，增加自然感 */
      transform: scaleX(-1);
    }

    .cloud-3 {
      bottom: -20%;
      left: -10%;
      width: 90%;
      height: 80%;
      background-image: url('assets/fog_3.png');
      opacity: 0.95;
    }

    .cloud-4 {
      bottom: -20%;
      right: -20%;
      width: 80%;
      height: 80%;
      background-image: url('assets/fog_5.png');
      opacity: 0.8;
      /* 上下翻轉 */
      transform: scaleY(-1);
    }

    /* ====== 動畫觸發後的狀態 ====== */

    /* 首頁變清晰 */
    body.is-clearing .homepage-mock {
      filter: blur(0px) brightness(1);
      transform: scale(1);
    }

    /* 雲霧向四周推移、放大（營造逼近相機後消失的感覺）、並漸漸透明 */
    body.is-clearing .cloud-1 {
      transform: translate(-30%, -30%) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-2 {
      /* 注意：保留原有的 scaleX(-1) 屬性 */
      transform: translate(30%, -30%) scaleX(-1) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-3 {
      transform: translate(-30%, 30%) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-4 {
      /* 注意：保留原有的 scaleY(-1) 屬性 */
      transform: translate(30%, 30%) scaleY(-1) scale(1.5);
      opacity: 0;
    }

    /* 控制按鈕 */
    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
    }

    .controls button {
      padding: 10px 24px;
      font-size: 16px;
      font-family: inherit;
      background: #12151a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      /* 預設隱藏 */
      visibility: hidden;
      /* 徹底隱藏，不可點擊 */
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    /* 當動畫啟動後，延遲顯示按鈕 */
    body.is-clearing .controls button {
      opacity: 1;
      visibility: visible;
      transition-delay: 2s;
      /* 延遲加快一秒，改為 2 秒 */
    }

    /* 文字切換動畫 */
    .homepage-mock h1,
    .homepage-mock p {
      transition: opacity 1s ease-in-out, filter 1s ease-in-out;
    }

    body.show-final-text .homepage-mock h1,
    body.show-final-text .homepage-mock p {
      opacity: 0;
      filter: blur(10px);
    }

    /* 最終標題文字容器 */
    .final-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
      z-index: 50;
    }

    body.show-final-text .final-content {
      opacity: 1;
      visibility: visible;
    }

    .final-content h2 {
      font-size: 4.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    /* 進入按鈕樣式 */
    .enter-btn {
      padding: 14px 40px;
      font-size: 18px;
      font-family: 'Noto Serif TC', serif;
      background: transparent;
      color: #12151a;
      border: 1.5px solid #12151a;
      border-radius: 0;
      /* 配合專案的方正風格 */
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease-out;
    }

    body.show-final-text .enter-btn {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 1s;
      /* 在標題出現後再出現 */
    }

    .enter-btn:hover {
      background: #12151a;
      color: #f4f2ee;
    }

    /* 強制瞬間重設，不帶動畫 */
    body.no-transition .cloud,
    body.no-transition .homepage-mock,
    body.no-transition .homepage-mock h1,
    body.no-transition .homepage-mock p,
    body.no-transition .final-content,
    body.no-transition .enter-btn,
    body.no-transition .controls button {
      transition: none !important;
    }
  </style>
</head>

<body>

  <!-- 初始首頁內容 -->
  <div class="homepage-mock">
    <h1>撥雲見月</h1>
    <p>這是一個開場動畫展示範例 (使用真實圖片)</p>
  </div>

  <!-- 最終顯示內容 -->
  <div class="final-content">
    <h2>現在，開始吧</h2>
    <button class="enter-btn">進入</button>
  </div>

  <!-- 雲霧層 -->
  <div class="clouds-container">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
  </div>

  <!-- 重播按鈕 -->
  <div class="controls">
    <button onclick="replayAnimation()">重新觀看動畫</button>
  </div>

  <script>
    let textTimer;

    // 啟動動畫序列
    function startSequence() {
      // 0.8秒後開始撥雲
      setTimeout(() => {
        document.body.classList.add('is-clearing');

        // 撥雲開始後 3.5 秒 (總共約 4.3 秒)，切換到最終文字
        textTimer = setTimeout(() => {
          document.body.classList.add('show-final-text');
        }, 3500);
      }, 800);
    }

    window.addEventListener('load', startSequence);

    function replayAnimation() {
      // 清除計時器防止衝突
      clearTimeout(textTimer);

      // 1. 瞬間回到初始狀態
      document.body.classList.add('no-transition');
      document.body.classList.remove('is-clearing');
      document.body.classList.remove('show-final-text');

      void document.body.offsetHeight;
      document.body.classList.remove('no-transition');

      // 2. 重新啟動序列
      setTimeout(startSequence, 50);
    }
  </script>
</body>

</html>
