<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Match - 流程頁面</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    @font-face {
      font-family: 'Iansui';
      src: url('assets/Iansui-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #F4F1DE url('assets/banner.png') center/cover no-repeat fixed;
      font-family: 'Iansui', 'Noto Serif TC', serif;
      color: #3D405B;
      overflow-x: hidden;
    }

    /* 左上角 Icon */
    .site-icon {
      position: absolute;
      top: 0px;
      left: 40px;
      width: 80px;
      height: auto;
      z-index: 60;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .site-icon:hover {
      transform: scale(1.05);
    }

    /* 頁面容器 */
    .page-container {
      width: 100%;
      height: 100%;
      display: none;
      /* 預設隱藏 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 0;
    }

    .page-container.active {
      display: flex;
    }

    /* --- 進場動畫 (Entrance Animation) --- */
    @keyframes gentleFadeIn {
      from { opacity: 0; filter: blur(10px); transform: translateY(20px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    /* 文字與輸入框淡入並微浮 */
    .page-container.active .page-title,
    .page-container.active .sub-title,
    .page-container.active .form-group,
    .page-container.active .tags-container,
    .page-container.active .grid-options {
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    /* 按鈕進場稍微延遲，製造層次感 */
    .page-container.active .action-buttons .action-btn {
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    .page-container.active .action-buttons .action-btn:nth-child(1) {
      animation-delay: 0.1s;
    }
    .page-container.active .action-buttons .action-btn:nth-child(2) {
      animation-delay: 0.15s;
    }
    .page-container.active .action-buttons .action-btn:nth-child(3) {
      animation-delay: 0.2s;
    }

    h2.page-title {
      font-size: 4rem;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 15px;
      margin-right: -15px;
      text-align: center;
      /* 額外優化：微弱白色陰影確保大標題不受背景干擾 */
      text-shadow: 0 4px 15px rgba(255, 255, 255, 0.5);
    }

    .sub-title {
      font-size: 1.5rem;
      margin-bottom: 30px;
      color: #E07A5F;
      /* 溫暖清晰的深邃陶土色 */
      font-weight: 600;
      /* 額外優化：白色光暈文字陰影，將文字與複雜背景隔離 */
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 2px 4px rgba(255, 255, 255, 0.8);
    }

    /* 按鈕樣式 */
    .action-buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 800px;
    }

    .action-btn {
      padding: 16px 32px;
      font-size: 1.125rem;
      font-weight: 600;
      font-family: 'Iansui', serif;
      background: #E07A5F;
      color: #FFFFFF;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(224, 122, 95, 0.2);
    }

    .action-btn:hover {
      background: #D16B50;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(224, 122, 95, 0.3);
    }

    .action-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 4px rgba(224, 122, 95, 0.2);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      background: #E0DDD6;
      color: #8D99AE;
    }

    .action-btn:disabled:hover {
      transform: none;
      box-shadow: none;
      background: #E0DDD6;
    }

    /* 表單與輸入區塊 */
    .form-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 24px;
      width: 100%;
      max-width: 400px;
    }

    .form-group label {
      font-size: 1.2rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .text-input {
      width: 100%;
      padding: 16px;
      font-size: 1.125rem;
      font-family: 'Iansui', serif;
      border: 2px solid #E0DDD6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #3D405B;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .text-input:focus {
      border-color: #E07A5F;
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(224, 122, 95, 0.15);
    }

    textarea.text-input {
      resize: vertical;
      min-height: 120px;
    }

    /* 標籤樣式 */
    .tags-container {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }

    .tag {
      padding: 8px 20px;
      border: none;
      border-radius: 20px;
      font-size: 1.1rem;
      background: #81B29A;
      color: #FFFFFF;
      box-shadow: 0 2px 4px rgba(129, 178, 154, 0.2);
    }

    /* 網格選項 (方向選擇 A B C D) */
    .grid-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 700px;
      width: 90%;
    }

    .grid-card {
      background: #FFFFFF;
      border: none;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      box-shadow: 0 4px 20px rgba(61, 64, 91, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .grid-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(61, 64, 91, 0.1);
    }

    .grid-letter {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: #E07A5F;
    }

    .grid-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .grid-desc {
      font-size: 1.1rem;
      color: #81B29A;
    }

    /* 測試用導覽列 (方便切換頁面) */
    .debug-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 999;
    }

    .debug-nav button {
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    /* 1. 紙張紋理 - 提高透明度並增加混合模式 */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.06;
      /* 從 0.04 提高 */
      mix-blend-mode: multiply;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }



    /* 6. 塵埃粒子 */
    .dust-motes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .mote {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      filter: blur(1.5px);
      animation: floatUp linear infinite;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* --- 離開動畫 (Exit Animation - Soft Float & Blur) --- */
    .page-container.exit-animation .page-title,
    .page-container.exit-animation .sub-title,
    .page-container.exit-animation .form-group,
    .page-container.exit-animation .tags-container,
    .page-container.exit-animation .grid-options,
    .page-container.exit-animation .action-btn {
      opacity: 0;
      filter: blur(10px);
      transform: translateY(-20px) !important;
      transition: opacity 0.6s ease, filter 0.6s ease, transform 0.6s ease !important;
    }
  </style>
</head>

<body>

  <!-- 環境裝飾元素 -->
  <div class="noise-overlay"></div>

  <div class="dust-motes" id="dust-motes"></div>

  <!-- 左上角 Icon -->
  <img src="assets/icon.png" class="site-icon" alt="Career Match Icon" style="cursor: pointer;"
    onclick="window.location.href='index.html'">

  <!-- 1. 想不想 分流 -->
  <div id="page-want-or-not" class="page-container active">
    <h2 class="page-title">想不想</h2>
    <div class="action-buttons">
      <button class="action-btn" onclick="goTo('page-questions')">我不太確定 有點迷路</button>
      <button class="action-btn" onclick="goTo('page-can-or-not')">我有想去的地方 / 想嘗試的方向</button>
    </div>
  </div>

  <!-- 2. 問卷 (Q1, Q2, Q3) -->
  <div id="page-questions" class="page-container">
    <div class="form-group">
      <label>Q1. 充電 / 耗能</label>
      <input id="input-q1" type="text" class="text-input" placeholder="...">
    </div>
    <div class="form-group">
      <label>Q2. 動機</label>
      <input id="input-q2" type="text" class="text-input" placeholder="...">
    </div>
    <div class="form-group">
      <label>Q3. 具體事件</label>
      <input id="input-q3" type="text" class="text-input" placeholder="...">
    </div>
    <div class="action-buttons" style="margin-top: 20px;">
      <button class="action-btn" onclick="goTo('page-can-or-not')">送出</button>
    </div>
  </div>

  <!-- 3. 能不能 -->
  <div id="page-can-or-not" class="page-container">
    <h2 class="page-title">能不能</h2>
    <div class="form-group" style="max-width: 600px;">
      <textarea id="input-can-or-not" class="text-input" placeholder="事件描述框 (概述提示...)"></textarea>
    </div>
    <div class="action-buttons">
      <button class="action-btn" onclick="goTo('page-event-summary')">enter</button>
    </div>
  </div>

  <!-- 4. 事件簡述 1 -->
  <div id="page-event-summary" class="page-container">
    <h2 class="page-title">事件簡述</h2>
    <div class="sub-title" id="display-event-1"
      style="font-style: italic; max-width: 600px; text-align: center; margin-bottom: 20px; line-height: 1.5;"></div>
    <div class="tags-container">
      <div class="tag">標籤 1</div>
      <div class="tag">標籤 2</div>
      <div class="tag">標籤 3</div>
    </div>
    <div class="action-buttons">
      <button class="action-btn" onclick="goTo('page-professions')">符合 / 沒問題</button>
      <button class="action-btn" onclick="goTo('page-adjust')">不太對，調整描述</button>
    </div>
  </div>

  <!-- 5. 調整向度 -->
  <div id="page-adjust" class="page-container">
    <h2 class="page-title" style="font-size: 3rem;">增減細節</h2>
    <div class="sub-title">請確認你的輸入內容足夠完整，這是你的最後一次機會。</div>
    <div class="form-group" style="max-width: 600px;">
      <textarea id="input-adjust" class="text-input" placeholder="重新描述同一事件"></textarea>
    </div>
    <div class="action-buttons">
      <button class="action-btn" onclick="goTo('page-event-summary-2')">enter</button>
    </div>
  </div>

  <!-- 6. 事件簡述 2 -->
  <div id="page-event-summary-2" class="page-container">
    <h2 class="page-title">事件簡述</h2>
    <div class="sub-title" id="display-event-2"
      style="font-style: italic; max-width: 600px; text-align: center; margin-bottom: 20px; line-height: 1.5;"></div>
    <div class="tags-container">
      <div class="tag">標籤 1</div>
      <div class="tag">標籤 2</div>
      <div class="tag">標籤 3</div>
    </div>
    <div class="action-buttons">
      <button class="action-btn" onclick="goTo('page-professions')">先試試看吧~</button>
    </div>
  </div>

  <!-- 7. 職業圖 (結果) -->
  <div id="page-professions" class="page-container">
    <div class="action-buttons">
      <button class="action-btn" onclick="window.location.href='subpages.html'">職業 A</button>
      <button class="action-btn" onclick="window.location.href='subpages.html'">職業 B</button>
    </div>
  </div>

  <!-- 8. 方向選擇 (A, B, C, D) -->
  <div id="page-menu" class="page-container">
    <div class="grid-options">
      <div class="grid-card">
        <div class="grid-letter">A</div>
        <div class="grid-title">挑吃 / 微型任務</div>
        <div class="grid-desc">熱門職業群，潛力發展建議</div>
      </div>
      <div class="grid-card">
        <div class="grid-letter">B</div>
        <div class="grid-title">特製</div>
      </div>
      <div class="grid-card">
        <div class="grid-letter">C</div>
        <div class="grid-title">私廚</div>
      </div>
      <div class="grid-card">
        <div class="grid-letter">D</div>
        <div class="grid-title">無菜單</div>
      </div>
    </div>
  </div>

  <!-- 開發測試用導覽列 -->
  <div class="debug-nav">
    <span style="color:white; line-height:26px; font-family:sans-serif; font-size:12px; margin-right:10px;">快速導覽:</span>
    <button onclick="goTo('page-want-or-not')">想不想</button>
    <button onclick="goTo('page-questions')">Q1-Q3問卷</button>
    <button onclick="goTo('page-can-or-not')">能不能</button>
    <button onclick="goTo('page-event-summary')">事件簡述1</button>
    <button onclick="goTo('page-adjust')">增減細節</button>
    <button onclick="goTo('page-event-summary-2')">事件簡述2</button>
    <button onclick="goTo('page-professions')">職業結果</button>
    <button onclick="goTo('page-menu')">ABCD選擇</button>
  </div>

  <script>
    // 建立塵埃粒子
    function createDustMotes() {
      const container = document.getElementById('dust-motes');
      if (!container) return;
      const moteCount = 15;
      for (let i = 0; i < moteCount; i++) {
        const mote = document.createElement('div');
        mote.classList.add('mote');

        const size = Math.random() * 4 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 15 + 10;
        const delay = Math.random() * -20;

        mote.style.width = `${size}px`;
        mote.style.height = `${size}px`;
        mote.style.left = `${left}vw`;
        mote.style.animationDuration = `${duration}s`;
        mote.style.animationDelay = `${delay}s`;

        container.appendChild(mote);
      }
    }

    function setupValidation() {
      // 針對有輸入框的頁面進行驗證
      document.querySelectorAll('.page-container').forEach(page => {
        const inputs = page.querySelectorAll('.text-input');
        // 找到該頁面的主要動作按鈕
        const actionBtns = page.querySelectorAll('.action-btn');

        if (inputs.length > 0 && actionBtns.length > 0) {
          // 初始化時禁用按鈕
          actionBtns.forEach(btn => btn.disabled = true);

          const checkInputs = () => {
            let allValid = true;
            // 該頁面的所有輸入框都必須大於等於兩個字
            inputs.forEach(input => {
              if (input.value.trim().length < 2) {
                allValid = false;
              }
            });
            // 根據驗證結果啟用或禁用按鈕
            actionBtns.forEach(btn => btn.disabled = !allValid);
          };

          // 綁定輸入事件
          inputs.forEach(input => {
            input.addEventListener('input', checkInputs);
          });
        }
      });
    }

    // 用來儲存使用者在各流程中輸入的資料
    let userProgressData = {};

    function goTo(pageId, immediate = false) {
      // 在離開當前頁面前，記錄該頁面的輸入內容
      const currentPage = document.querySelector('.page-container.active');

      const doSwitch = () => {
        const inputs = currentPage ? currentPage.querySelectorAll('.text-input') : [];
        if (inputs.length > 0) {
          inputs.forEach(input => {
            if (input.id) {
              userProgressData[input.id] = input.value;

              // 雙向綁定邏輯：保持「能不能」與「增減細節」的文字同步
              if (input.id === 'input-can-or-not') {
                userProgressData['input-adjust'] = input.value;
                const adjustInput = document.getElementById('input-adjust');
                if (adjustInput) adjustInput.value = input.value;
              } else if (input.id === 'input-adjust') {
                userProgressData['input-can-or-not'] = input.value;
                const canOrNotInput = document.getElementById('input-can-or-not');
                if (canOrNotInput) canOrNotInput.value = input.value;
              }
            }
          });
          localStorage.setItem('careerRPG_data', JSON.stringify(userProgressData));
        }

        // 隱藏所有頁面並移除動畫狀態
        document.querySelectorAll('.page-container').forEach(page => {
          page.classList.remove('active');
          page.classList.remove('exit-animation');
        });

        // 顯示目標頁面
        const target = document.getElementById(pageId);
        if (target) {
          // 渲染邏輯
          if (pageId === 'page-event-summary') {
            const display1 = document.getElementById('display-event-1');
            if (display1) display1.textContent = `「${userProgressData['input-can-or-not'] || '無輸入內容'}」`;
          }
          if (pageId === 'page-event-summary-2') {
            const display2 = document.getElementById('display-event-2');
            if (display2) display2.textContent = `「${userProgressData['input-adjust'] || userProgressData['input-can-or-not'] || '無輸入內容'}」`;
          }
          target.classList.add('active');
        }
      };

      if (currentPage && !immediate) {
        // 正常流程：播放退場動畫
        currentPage.classList.add('exit-animation');
        setTimeout(doSwitch, 600);
      } else {
        // 初始載入或強制跳轉：直接切換
        doSwitch();
      }
    }

    // 當頁面載入時，檢查 URL 參數決定顯示哪一頁，並設定驗證與自動填入邏輯
    window.addEventListener('load', () => {
      // 啟動裝飾粒子
      createDustMotes();

      // 1. 讀取 LocalStorage 歷史紀錄
      const savedData = localStorage.getItem('careerRPG_data');
      if (savedData) {
        try {
          userProgressData = JSON.parse(savedData);
          // 2. 自動將資料填回對應的輸入框
          document.querySelectorAll('.text-input').forEach(input => {
            if (input.id && userProgressData[input.id]) {
              input.value = userProgressData[input.id];
            }
          });
        } catch (e) {
          console.error('讀取歷史紀錄失敗', e);
        }
      }

      // 3. 綁定防呆驗證邏輯
      setupValidation();

      // 4. 對已有資料的輸入框觸發一次驗證，讓原本已填好的按鈕解鎖
      document.querySelectorAll('.text-input').forEach(input => {
        if (input.value) {
          input.dispatchEvent(new Event('input'));
        }
      });

      const urlParams = new URLSearchParams(window.location.search);
      const step = urlParams.get('step');
      if (step) {
        goTo(step, true); // 初始進入時，使用 immediate 模式跳過退場動畫
      }
    });
  </script>

</body>

</html>
