<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Match - 流程頁面</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    :root {
      --primary: #81B29A;
      /* 漂亮的綠色 */
    }

    @font-face {
      font-family: 'Iansui';
      src: url('assets/Iansui-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #F4F1DE url('assets/banner.png') center/cover no-repeat fixed;
      font-family: 'Iansui', 'Noto Serif TC', serif;
      color: #3D405B;
      overflow-x: hidden;
    }

    /* 左上角 Icon */
    .site-icon {
      position: absolute;
      top: 0px;
      left: 40px;
      width: 80px;
      height: auto;
      z-index: 60;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .site-icon:hover {
      transform: scale(1.05);
    }

    /* 頁面容器 */
    .page-container {
      width: 100%;
      height: 100%;
      display: none;
      /* 預設隱藏 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 0;
    }

    .page-container.active {
      display: flex;
    }

    /* --- 進場動畫 (Entrance Animation) --- */
    @keyframes gentleFadeIn {
      from {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }

    /* 文字與輸入框淡入並微浮 */
    .page-container.active .page-title,
    .page-container.active .sub-title,
    .page-container.active .form-group,
    .page-container.active .tags-container,
    .page-container.active .grid-options,
    .page-container.active .semantic-anim-item {
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    /* 語意分析成果內容的層次感進場 */
    .page-container.active .semantic-anim-item:nth-child(1) {
      animation-delay: 0.1s;
    }

    .page-container.active .semantic-anim-item:nth-child(2) {
      animation-delay: 0.2s;
    }

    .page-container.active .semantic-anim-item:nth-child(3) {
      animation-delay: 0.3s;
    }

    .page-container.active .semantic-anim-item:nth-child(4) {
      animation-delay: 0.4s;
    }

    .page-container.active .semantic-anim-item:nth-child(5) {
      animation-delay: 0.5s;
    }

    .page-container.active .semantic-anim-item:nth-child(6) {
      animation-delay: 0.6s;
    }

    /* 按鈕進場稍微延遲，製造層次感 */
    .page-container.active .action-buttons .action-btn {
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    .page-container.active .action-buttons .action-btn:nth-child(1) {
      animation-delay: 0.1s;
    }

    .page-container.active .action-buttons .action-btn:nth-child(2) {
      animation-delay: 0.15s;
    }

    .page-container.active .action-buttons .action-btn:nth-child(3) {
      animation-delay: 0.2s;
    }

    h2.page-title {
      font-size: 4rem;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 15px;
      margin-right: -15px;
      text-align: center;
      /* 額外優化：微弱白色陰影確保大標題不受背景干擾 */
      text-shadow: 0 4px 15px rgba(255, 255, 255, 0.5);
    }

    .sub-title {
      font-size: 1.5rem;
      margin-bottom: 30px;
      color: #E07A5F;
      /* 溫暖清晰的深邃陶土色 */
      font-weight: 600;
      /* 額外優化：白色光暈文字陰影，將文字與複雜背景隔離 */
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 2px 4px rgba(255, 255, 255, 0.8);
    }

    /* 按鈕樣式 */
    .action-buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 800px;
    }

    .action-btn {
      padding: 16px 32px;
      font-size: 1.125rem;
      font-weight: 600;
      font-family: 'Iansui', serif;
      background: #E07A5F;
      color: #FFFFFF;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(224, 122, 95, 0.2);
    }

    .action-btn:hover {
      background: #D16B50;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(224, 122, 95, 0.3);
    }

    .action-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 4px rgba(224, 122, 95, 0.2);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      background: #E0DDD6;
      color: #8D99AE;
    }

    .action-btn:disabled:hover {
      transform: none;
      box-shadow: none;
      background: #E0DDD6;
    }

    /* 表單與輸入區塊 */
    .form-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 24px;
      width: 100%;
      max-width: 400px;
    }

    .form-group label {
      font-size: 1.2rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .text-input {
      width: 100%;
      padding: 16px;
      font-size: 1.125rem;
      font-family: 'Iansui', serif;
      border: 2px solid #E0DDD6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #3D405B;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .text-input:focus {
      border-color: #E07A5F;
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(224, 122, 95, 0.15);
    }

    textarea.text-input {
      resize: vertical;
      min-height: 120px;
    }

    /* 標籤樣式 */
    .tags-container {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }

    .tag {
      padding: 8px 20px;
      border: none;
      border-radius: 20px;
      font-size: 1.1rem;
      background: #81B29A;
      color: #FFFFFF;
      box-shadow: 0 2px 4px rgba(129, 178, 154, 0.2);
    }

    /* 網格選項 (方向選擇 A B C D) */
    .grid-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 700px;
      width: 90%;
    }

    .grid-card {
      background: #FFFFFF;
      border: none;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      box-shadow: 0 4px 20px rgba(61, 64, 91, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .grid-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(61, 64, 91, 0.1);
    }

    .grid-letter {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: #E07A5F;
    }

    .grid-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .grid-desc {
      font-size: 1.1rem;
      color: #81B29A;
    }

    /* 測試用導覽列 (方便切換頁面) */
    .debug-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 999;
    }

    .debug-nav button {
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    /* 1. 紙張紋理 - 提高透明度並增加混合模式 */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.06;
      /* 從 0.04 提高 */
      mix-blend-mode: multiply;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }



    /* 6. 塵埃粒子 */
    .dust-motes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .mote {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      filter: blur(1.5px);
      animation: floatUp linear infinite;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* --- 離開動畫 (Exit Animation - Soft Float & Blur) --- */
    .page-container.exit-animation .page-title,
    .page-container.exit-animation .sub-title,
    .page-container.exit-animation .form-group,
    .page-container.exit-animation .tags-container,
    .page-container.exit-animation .grid-options,
    .page-container.exit-animation .semantic-anim-item,
    .page-container.exit-animation .action-btn {
      opacity: 0;
      filter: blur(10px);
      transform: translateY(-20px) !important;
      transition: opacity 0.6s ease, filter 0.6s ease, transform 0.6s ease !important;
    }
  </style>
</head>

  <div id="page-menu" class="page-container">

  <div class="debug-nav">
    <span style="color:white; line-height:26px; font-family:sans-serif; font-size:12px; margin-right:10px;">快速導覽:</span>
    <button onclick="goTo('page-want-or-not')">想不想</button>
    <button onclick="goTo('page-questions')">Q1-Q3問卷</button>
    <button onclick="goTo('page-can-or-not')">能不能</button>
    <button onclick="goTo('page-event-summary')">事件簡述1</button>
    <button onclick="goTo('page-adjust')">調整向度</button>
    <button onclick="goTo('page-event-summary-2')">事件簡述2</button>
    <button onclick="goTo('page-professions')">職業結果</button>
    <button onclick="goTo('page-menu')">ABCD選擇</button>
  </div>

  <script>
    // 建立塵埃粒子
    function createDustMotes() {
      const container = document.getElementById('dust-motes');
      if (!container) return;
      const moteCount = 15;
      for (let i = 0; i < moteCount; i++) {
        const mote = document.createElement('div');
        mote.classList.add('mote');

        const size = Math.random() * 4 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 15 + 10;
        const delay = Math.random() * -20;

        mote.style.width = `${size}px`;
        mote.style.height = `${size}px`;
        mote.style.left = `${left}vw`;
        mote.style.animationDuration = `${duration}s`;
        mote.style.animationDelay = `${delay}s`;

        container.appendChild(mote);
      }
    }

    function setupValidation() {
      // 針對有輸入框的頁面進行驗證
      document.querySelectorAll('.page-container').forEach(page => {
        const inputs = page.querySelectorAll('.text-input');
        // 找到該頁面的主要動作按鈕
        const actionBtns = page.querySelectorAll('.action-btn');

        if (inputs.length > 0 && actionBtns.length > 0) {
          // 初始化時禁用按鈕
          actionBtns.forEach(btn => btn.disabled = true);

          const checkInputs = () => {
            let allValid = true;
            // 該頁面的所有輸入框都必須大於等於兩個字
            inputs.forEach(input => {
              if (input.value.trim().length < 2) {
                allValid = false;
              }
            });
            // 根據驗證結果啟用或禁用按鈕
            actionBtns.forEach(btn => btn.disabled = !allValid);
          };

          // 綁定輸入事件
          inputs.forEach(input => {
            input.addEventListener('input', checkInputs);
          });
        }
      });
    }

    let userProgressData = {};
    let lastSummaryPage = 'page-event-summary-want';
    let careerRPG_page = 'page-want-or-not';

    async function analyzeByOllama(text) {
      if (!text || text === '無輸入內容') return [];
      try {
        const response = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: "career-analyzer",
            prompt: `分析這段描述，提取核心職涯相關的關鍵字標籤(json格式, 欄位: tags): ${text}`,
            stream: false,
          })
        });
        if (!response.ok) return ['連線失敗'];
        const data = await response.json();
        let rawResponse = data.response.trim();
        rawResponse = rawResponse.replace(/^['"`]|['"`]$/g, '');
        const parsed = JSON.parse(rawResponse);
        return parsed.tags || [];
      } catch (e) {
        console.error(e);
        return ['無法解析'];
      }
    }

    function goTo(pageId, immediate = false) {
      const currentPage = document.querySelector('.page-container.active');
      const doSwitch = () => {
        const inputs = currentPage ? currentPage.querySelectorAll('.text-input') : [];
        if (inputs.length > 0) {
          inputs.forEach(input => {
            if (input.id) {
              userProgressData[input.id] = input.value;
              // 雙向綁定邏輯：保持「能不能」與「增減細節」的文字同步
              if (input.id === 'input-can-or-not') {
                userProgressData['input-adjust'] = input.value;
                const adjustInput = document.getElementById('input-adjust');
                if (adjustInput) adjustInput.value = input.value;
              } else if (input.id === 'input-adjust') {
                userProgressData['input-can-or-not'] = input.value;
                const canOrNotInput = document.getElementById('input-can-or-not');
                if (canOrNotInput) canOrNotInput.value = input.value;
              }
              // 想不想路線的雙向綁定
              if (input.id === 'input-q1') {
                userProgressData['input-adjust-q1'] = input.value;
                const adj = document.getElementById('input-adjust-q1');
                if (adj) adj.value = input.value;
              } else if (input.id === 'input-adjust-q1') {
                userProgressData['input-q1'] = input.value;
                const orig = document.getElementById('input-q1');
                if (orig) orig.value = input.value;
              }
              if (input.id === 'input-q2') {
                userProgressData['input-adjust-q2'] = input.value;
                const adj = document.getElementById('input-adjust-q2');
                if (adj) adj.value = input.value;
              } else if (input.id === 'input-adjust-q2') {
                userProgressData['input-q2'] = input.value;
                const orig = document.getElementById('input-q2');
                if (orig) orig.value = input.value;
              }
              if (input.id === 'input-q3') {
                userProgressData['input-adjust-q3'] = input.value;
                const adj = document.getElementById('input-adjust-q3');
                if (adj) adj.value = input.value;
              } else if (input.id === 'input-adjust-q3') {
                userProgressData['input-q3'] = input.value;
                const orig = document.getElementById('input-q3');
                if (orig) orig.value = input.value;
              }
            }
          });
          localStorage.setItem('careerRPG_data', JSON.stringify(userProgressData));
        }

        localStorage.setItem('careerRPG_page', pageId);
        document.querySelectorAll('.page-container').forEach(page => {
          page.classList.remove('active', 'exit-animation');
        });

        const target = document.getElementById(pageId);
        if (target) {
          if (pageId === 'page-event-summary') {
            document.getElementById('display-event-1').textContent = `「${userProgressData['input-can-or-not'] || '無輸入內容'}」`;
          }
          if (pageId === 'page-event-summary-2') {
            document.getElementById('display-event-2').textContent = `「${userProgressData['input-adjust'] || userProgressData['input-can-or-not'] || '無輸入內容'}」`;
          }
          if (pageId === 'page-event-summary-want') {
            const displayWant1 = document.getElementById('display-event-want-1');
            const q1 = userProgressData['input-q1'] || '無輸入內容';
            const q2 = userProgressData['input-q2'] || '無輸入內容';
            const q3 = userProgressData['input-q3'] || '無輸入內容';
            if (displayWant1) {
              const blockStyle = "background: rgba(255, 255, 255, 0.65); padding: 16px 24px; border-radius: 16px; margin-bottom: 16px; text-align: left; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); display: flex; align-items: flex-start; gap: 12px; font-size: 1.25rem; font-style: normal; color: #3D405B; text-shadow: none;";
              const labelStyle = "font-weight: 600; color: #E07A5F; min-width: 36px; font-size: 1.3rem;";
              const textStyle = "flex: 1; line-height: 1.5; font-weight: 500;";
              displayWant1.innerHTML = `
                <div style="${blockStyle}">
                  <div style="${labelStyle}">Q1</div>
                  <div style="${textStyle}">${q1}</div>
                </div>
                <div style="${blockStyle}">
                  <div style="${labelStyle}">Q2</div>
                  <div style="${textStyle}">${q2}</div>
                </div>
                <div style="${blockStyle.replace('margin-bottom: 16px;', 'margin-bottom: 0;')}">
                  <div style="${labelStyle}">Q3</div>
                  <div style="${textStyle}">${q3}</div>
                </div>
              `;
            }
          }
          if (pageId === 'page-event-summary-2-want') {
            const displayWant2 = document.getElementById('display-event-want-2');
            const q1 = userProgressData['input-adjust-q1'] || '無輸入內容';
            const q2 = userProgressData['input-adjust-q2'] || '無輸入內容';
            const q3 = userProgressData['input-adjust-q3'] || '無輸入內容';
            if (displayWant2) {
              const blockStyle = "background: rgba(255, 255, 255, 0.65); padding: 16px 24px; border-radius: 16px; margin-bottom: 16px; text-align: left; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); display: flex; align-items: flex-start; gap: 12px; font-size: 1.25rem; font-style: normal; color: #3D405B; text-shadow: none;";
              const labelStyle = "font-weight: 600; color: #E07A5F; min-width: 36px; font-size: 1.3rem;";
              const textStyle = "flex: 1; line-height: 1.5; font-weight: 500;";
              displayWant2.innerHTML = `
                <div style="${blockStyle}">
                  <div style="${labelStyle}">Q1</div>
                  <div style="${textStyle}">${q1}</div>
                </div>
                <div style="${blockStyle}">
                  <div style="${labelStyle}">Q2</div>
                  <div style="${textStyle}">${q2}</div>
                </div>
                <div style="${blockStyle.replace('margin-bottom: 16px;', 'margin-bottom: 0;')}">
                  <div style="${labelStyle}">Q3</div>
                  <div style="${textStyle}">${q3}</div>
                </div>
              `;
            }
          }

          if (pageId === 'page-semantic-analysis-want') {
            localStorage.setItem('careerRPG_hasWantHistory', 'true');
            const semanticContent = document.getElementById('semantic-content-want');
            const q1 = userProgressData['input-adjust-q1'] || userProgressData['input-q1'] || '無輸入內容';
            const q2 = userProgressData['input-adjust-q2'] || userProgressData['input-q2'] || '無輸入內容';
            const q3 = userProgressData['input-adjust-q3'] || userProgressData['input-q3'] || '無輸入內容';

            const lastTextQ1 = userProgressData['last-text-want-q1'] || '';
            const lastTextQ2 = userProgressData['last-text-want-q2'] || '';
            const lastTextQ3 = userProgressData['last-text-want-q3'] || '';

            // Check for changes (excluding whitespace)
            const changedQ1 = q1.trim() !== lastTextQ1.trim() && q1 !== '無輸入內容';
            const changedQ2 = q2.trim() !== lastTextQ2.trim() && q2 !== '無輸入內容';
            const changedQ3 = q3.trim() !== lastTextQ3.trim() && q3 !== '無輸入內容';

            if (changedQ1) userProgressData['tags-want-q1'] = null;
            if (changedQ2) userProgressData['tags-want-q2'] = null;
            if (changedQ3) userProgressData['tags-want-q3'] = null;

            const blockStyle = "background: rgba(255, 255, 255, 0.65); padding: 16px 24px; border-radius: 16px; text-align: left; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); display: flex; align-items: flex-start; gap: 12px; font-size: 1.25rem; font-style: normal; color: #3D405B; text-shadow: none;";
            const labelStyle = "font-weight: 600; color: #E07A5F; min-width: 36px; font-size: 1.3rem;";
            const textStyle = "flex: 1; line-height: 1.5; font-weight: 500;";
            const tagsStyle = "display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; padding-left: 48px;";

            const renderTags = (tags) => {
              if (!tags || tags.length === 0) return `<span style="color:#888; font-size:0.9rem;">(無相符標籤)</span>`;
              return tags.map(t => `<div class="tag" style="background:var(--primary); color:white; padding:6px 16px; border-radius:20px; font-size:1rem; box-shadow: 0 4px 12px rgba(129, 178, 154, 0.3);">${t}</div>`).join('');
            };

            const isErrorTag = (tags) => tags && tags.length === 1 && (tags[0] === '連線失敗' || tags[0] === '無法解析');

            const savedTagsQ1 = userProgressData['tags-want-q1'];
            const savedTagsQ2 = userProgressData['tags-want-q2'];
            const savedTagsQ3 = userProgressData['tags-want-q3'];

            if (semanticContent) {
              semanticContent.innerHTML = `
                <div class="semantic-anim-item">
                  <div style="${blockStyle}">
                    <div style="${labelStyle}">Q1</div>
                    <div style="${textStyle}">${q1}</div>
                  </div>
                  <div id="tags-want-q1" style="${tagsStyle}">
                    ${(savedTagsQ1 && !isErrorTag(savedTagsQ1)) ? renderTags(savedTagsQ1) : '<div class="tag" style="font-size: 1rem; padding: 6px 16px; color: #E07A5F; border: 1px solid #E07A5F; background: transparent;">⏳ 分析中...</div>'}
                  </div>
                </div>
                <div class="semantic-anim-item">
                  <div style="${blockStyle}">
                    <div style="${labelStyle}">Q2</div>
                    <div style="${textStyle}">${q2}</div>
                  </div>
                  <div id="tags-want-q2" style="${tagsStyle}">
                    ${(savedTagsQ2 && !isErrorTag(savedTagsQ2)) ? renderTags(savedTagsQ2) : '<div class="tag" style="font-size: 1rem; padding: 6px 16px; color: #E07A5F; border: 1px solid #E07A5F; background: transparent;">⏳ 分析中...</div>'}
                  </div>
                </div>
                <div class="semantic-anim-item">
                  <div style="${blockStyle}">
                    <div style="${labelStyle}">Q3</div>
                    <div style="${textStyle}">${q3}</div>
                  </div>
                  <div id="tags-want-q3" style="${tagsStyle}">
                    ${(savedTagsQ3 && !isErrorTag(savedTagsQ3)) ? renderTags(savedTagsQ3) : '<div class="tag" style="font-size: 1rem; padding: 6px 16px; color: #E07A5F; border: 1px solid #E07A5F; background: transparent;">⏳ 分析中...</div>'}
                  </div>
                </div>
              `;

              // Trigger analysis if changed, missing, or previously errored
              if (changedQ1 || !savedTagsQ1 || isErrorTag(savedTagsQ1)) {
                if (q1 !== '無輸入內容') {
                  analyzeByOllama(q1).then(tags => {
                    userProgressData['tags-want-q1'] = tags;
                    userProgressData['last-text-want-q1'] = q1.trim();
                    localStorage.setItem('careerRPG_data', JSON.stringify(userProgressData));
                    const el = document.getElementById('tags-want-q1'); if (el) el.innerHTML = renderTags(tags);
                  });
                }
              }
              if (changedQ2 || !savedTagsQ2 || isErrorTag(savedTagsQ2)) {
                if (q2 !== '無輸入內容') {
                  analyzeByOllama(q2).then(tags => {
                    userProgressData['tags-want-q2'] = tags;
                    userProgressData['last-text-want-q2'] = q2.trim();
                    localStorage.setItem('careerRPG_data', JSON.stringify(userProgressData));
                    const el = document.getElementById('tags-want-q2'); if (el) el.innerHTML = renderTags(tags);
                  });
                }
              }
              if (changedQ3 || !savedTagsQ3 || isErrorTag(savedTagsQ3)) {
                if (q3 !== '無輸入內容') {
                  analyzeByOllama(q3).then(tags => {
                    userProgressData['tags-want-q3'] = tags;
                    userProgressData['last-text-want-q3'] = q3.trim();
                    localStorage.setItem('careerRPG_data', JSON.stringify(userProgressData));
                    const el = document.getElementById('tags-want-q3'); if (el) el.innerHTML = renderTags(tags);
                  });
                }
              }
            }
          }

          if (pageId === 'page-semantic-analysis-able') {
            localStorage.setItem('careerRPG_hasAbleHistory', 'true');
            const semanticContent = document.getElementById('semantic-content-able');
            const ableEvent = userProgressData['input-adjust'] || userProgressData['input-can-or-not'] || '無輸入內容';

            const lastTextAble = userProgressData['last-text-able'] || '';
            const changedAble = ableEvent.trim() !== lastTextAble.trim() && ableEvent !== '無輸入內容';

            if (changedAble) userProgressData['tags-able'] = null;

            const blockStyle = "background: rgba(255, 255, 255, 0.65); padding: 16px 24px; border-radius: 16px; text-align: left; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); display: flex; align-items: flex-start; gap: 12px; font-size: 1.25rem; font-style: normal; color: #3D405B; text-shadow: none;";
            const labelStyle = "font-weight: 600; color: #E07A5F; min-width: 36px; font-size: 1.3rem;";
            const textStyle = "flex: 1; line-height: 1.5; font-weight: 500;";
            const tagsStyle = "display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; padding-left: 48px;";

            const renderTags = (tags) => {
              if (!tags || tags.length === 0) return `<span style="color:#888; font-size:0.9rem;">(無相符標籤)</span>`;
              return tags.map(t => `<div class="tag" style="background:var(--primary); color:white; padding:6px 16px; border-radius:20px; font-size:1rem; box-shadow: 0 4px 12px rgba(129, 178, 154, 0.3);">${t}</div>`).join('');
            };

            const isErrorTag = (tags) => tags && tags.length === 1 && (tags[0] === '連線失敗' || tags[0] === '無法解析');

            const savedTagsAble = userProgressData['tags-able'];

            if (semanticContent) {
              semanticContent.innerHTML = `
                <div class="semantic-anim-item">
                  <div style="${blockStyle}">
                    <div style="${labelStyle}">事件</div>
                    <div style="${textStyle}">${ableEvent}</div>
                  </div>
                  <div id="tags-able-event" style="${tagsStyle}">
                    ${(savedTagsAble && !isErrorTag(savedTagsAble)) ? renderTags(savedTagsAble) : '<div class="tag" style="font-size: 1rem; padding: 6px 16px; color: #E07A5F; border: 1px solid #E07A5F; background: transparent;">⏳ 分析中...</div>'}
                  </div>
                </div>
              `;

              if (changedAble || !savedTagsAble || isErrorTag(savedTagsAble)) {
                if (ableEvent !== '無輸入內容') {
                  analyzeByOllama(ableEvent).then(tags => {
                    userProgressData['tags-able'] = tags;
                    userProgressData['last-text-able'] = ableEvent.trim();
                    localStorage.setItem('careerRPG_data', JSON.stringify(userProgressData));
                    const el = document.getElementById('tags-able-event');
                    if (el) el.innerHTML = renderTags(tags);
                  });
                }
              }
            }
          }

          if (pageId === 'page-review-want' || pageId === 'page-review-able') {
            const isWant = pageId === 'page-review-want';
            const reviewContent = document.getElementById(isWant ? 'review-content-want' : 'review-content-able');

            const blockStyle = "background: rgba(255, 255, 255, 0.65); padding: 16px 24px; border-radius: 16px; text-align: left; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); color: #3D405B; line-height: 1.5; font-size: 1.25rem;";

            const renderTags = (tags) => {
              if (!tags || tags.length === 0) return `<span style="color:#888; font-size:0.9rem;">(無相符標籤)</span>`;
              return tags.map(t => `<div class="tag" style="background:var(--primary); color:white; padding:6px 16px; border-radius:20px; font-size:1rem; box-shadow: 0 4px 12px rgba(129, 178, 154, 0.3);">${t}</div>`).join('');
            };

            let tagsHTML = '';
            let recentEvent = '';

            if (isWant) {
              recentEvent = userProgressData['input-adjust-q1'] || userProgressData['input-q1'] || '近期想不想事件紀錄...';
              const tags = userProgressData['tags-want-q1'] || [];
              tagsHTML = renderTags(tags);
            } else {
              recentEvent = userProgressData['input-adjust'] || userProgressData['input-can-or-not'] || '近期能不能事件紀錄...';
              const tags = userProgressData['tags-able'] || [];
              tagsHTML = renderTags(tags);
            }

            if (reviewContent) {
              reviewContent.innerHTML = `
                <div class="semantic-anim-item">
                  <h3 style="color: #E07A5F; margin-bottom: 12px; text-align: left; font-size: 1.5rem;">近期事件</h3>
                  <div style="${blockStyle}">${recentEvent}</div>
                  <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;">
                    ${tagsHTML}
                  </div>
                </div>
              `;
            }
          }

          target.classList.add('active');
        }
      };

      if (currentPage && !immediate) {
        // 正常流程：播放退場動畫
        currentPage.classList.add('exit-animation');
        setTimeout(doSwitch, 600);
      } else {
        // 初始載入或強制跳轉：直接切換
        doSwitch();
      }
    }

    // 當頁面載入時，檢查 URL 參數決定顯示哪一頁，並設定驗證與自動填入邏輯
    window.addEventListener('load', () => {
      // 啟動裝飾粒子
      createDustMotes();

      // 1. 讀取 LocalStorage 歷史紀錄
      const savedData = localStorage.getItem('careerRPG_data');
      if (savedData) {
        try {
          userProgressData = JSON.parse(savedData);
          // 2. 自動將資料填回對應的輸入框
          document.querySelectorAll('.text-input').forEach(input => {
            if (input.id && userProgressData[input.id]) {
              input.value = userProgressData[input.id];
            }
          });
        } catch (e) {
          console.error('讀取歷史紀錄失敗', e);
        }
      }

      // 3. 綁定防呆驗證邏輯
      setupValidation();

      // 4. 對已有資料的輸入框觸發一次驗證，讓原本已填好的按鈕解鎖
      document.querySelectorAll('.text-input').forEach(input => {
        if (input.value) {
          input.dispatchEvent(new Event('input'));
        }
      });

      const urlParams = new URLSearchParams(window.location.search);
      const step = urlParams.get('step');
      const savedPage = localStorage.getItem('careerRPG_page');

      if (step === 'page-want-or-not' && localStorage.getItem('careerRPG_hasWantHistory') === 'true') {
        goTo('page-review-want', true);
        window.history.replaceState({}, '', window.location.pathname);
      } else if (step === 'page-can-or-not' && localStorage.getItem('careerRPG_hasAbleHistory') === 'true') {
        goTo('page-review-able', true);
        window.history.replaceState({}, '', window.location.pathname);
      } else if (step) {
        goTo(step, true);
        window.history.replaceState({}, '', window.location.pathname);
      } else if (savedPage) {
        goTo(savedPage, true);
      } else {
        goTo('page-want-or-not', true);
      }
    });
  </script>

</body>

</html>
