<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初路 - 初級大人的職業探索之路</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    /* ===== 品牌色票 ===== */
    :root {
      --s10: #FAF6F3;   /* 靜白・背景主色 */
      --s30: #F2DFD3;   /* 奶霧粉・品牌主色 */
      --s40: #E8D5C7;   /* 淡燕麥・邊框 */
      --s50: #D4A898;   /* 舊珊瑚・強調色 */
      --n50: #2C2A26;   /* 碳墨・主文字 */
      --n40: #4A3E38;   /* 深土・副標題 */
      --n30: #8C7B72;   /* 木煙・輔助文字 */
      --a20: #A8B498;   /* 霧綠・確認狀態 */
    }

    @font-face {
      font-family: 'Iansui';
      src: url('assets/Iansui-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--s10);
      font-family: 'Iansui', 'Noto Serif TC', serif;
      color: var(--n50);
    }

    /* 首頁背景底圖 */
    .homepage-mock {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* 品牌靜白 overlay (25%) 淡化背景圖，保留底紋質感 */
      background: linear-gradient(
        rgba(250, 246, 243, 0.25),
        rgba(250, 246, 243, 0.25)
      ), url('assets/abanner.png') center/cover no-repeat;
      color: var(--n50);
    }

    /* 最終顯示內容容器 */
    .final-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
      z-index: 50;
    }

    body.show-final-text .final-content {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .title-wrapper {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.show-final-text .final-content .title-wrapper {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    .final-content h2 {
      font-size: 6.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 30px;
      margin-right: -30px;
      text-wrap: balance;
      
      /* 品牌色：N50 碳墨 → N40 深土 漸層 */
      background: linear-gradient(135deg, var(--n50) 0%, var(--n40) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      
      /* 以 S10 靜白柔光托底，取代刺眼的純白光暈 */
      filter: drop-shadow(0 0 12px rgba(250, 246, 243, 0.9)) 
              drop-shadow(0 4px 20px rgba(250, 246, 243, 0.6));
    }

    .final-subtitle {
      font-size: 1.25rem;
      font-weight: 600;
      /* 品牌色 N40 深土 作為副標題色，對比清晰且溫潤 */
      color: var(--n40);
      letter-spacing: 8px;
      margin-right: -8px;
      margin-top: 0;
      margin-bottom: 48px;
      text-wrap: balance;
      
      /* 以 S10 靜白作為文字的柔和光暈底色 */
      text-shadow: 0 2px 10px rgba(250, 246, 243, 0.95), 
                   0 1px 4px rgba(250, 246, 243, 0.85);
      
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.show-final-text .final-subtitle {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
      animation-delay: 0.15s;
    }

    .action-buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    @keyframes gentleFadeIn {
      from {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }

    /* 進入按鈕樣式 - 品牌引導風格 */
    .action-btn {
      padding: 16px 32px;
      font-size: 1.125rem;
      font-weight: 600;
      font-family: 'Iansui', serif;
      /* S50 舊珊瑚 底色，S10 靜白 文字 */
      background: var(--s50);
      color: var(--s10);
      border: none;
      border-radius: 24px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      box-shadow: 0 4px 12px rgba(212, 168, 152, 0.3);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    /* 讓按鈕接續出現 */
    body.show-final-text .action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: none;
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    /* 動畫完全結束後才允許點擊 */
    body.btns-ready .action-btn {
      pointer-events: auto;
    }

    body.btns-ready .action-btn:hover {
      background: #C39787;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(212, 168, 152, 0.45);
    }

    body.btns-ready .action-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 4px rgba(212, 168, 152, 0.25);
    }

    body.show-final-text .action-btn:nth-child(1) {
      animation-delay: 0.3s;
    }

    body.show-final-text .action-btn:nth-child(2) {
      animation-delay: 0.45s;
    }

    /* 左上角 Icon 樣式 */
    .site-icon {
      position: absolute;
      top: 20px;
      left: 40px;
      width: 80px;
      height: auto;
      z-index: 60;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    body.show-final-text .site-icon {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* 紙張紋理 */
    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.06;
      mix-blend-mode: multiply;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }

    /* 塵埃粒子 */
    .dust-motes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 25;
      overflow: hidden;
    }

    .mote {
      position: absolute;
      background: rgba(250, 246, 243, 0.85);
      border-radius: 50%;
      filter: blur(1.5px);
      animation: floatUp linear infinite;
      box-shadow: 0 0 4px rgba(250, 246, 243, 0.7);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- 環境裝飾元素 -->
  <div class="noise-overlay"></div>

  <div class="dust-motes" id="dust-motes"></div>

  <!-- 左上角 Icon -->
  <img src="assets/icon.png" class="site-icon" alt="Career Match Icon">

  <!-- 初始首頁背景 (清晰背景) -->
  <div class="homepage-mock"></div>

  <!-- 最終顯示內容 (主標題與副標題，一進來便自動淡入) -->
  <div class="final-content">
    <div class="title-wrapper">
      <h2>初路</h2>
    </div>
    <p class="final-subtitle">初級大人的探索之路</p>
    <div class="action-buttons">
      <button class="action-btn" onclick="window.location.href='career-flow.html?step=start'">背景建構</button>
      <button class="action-btn" onclick="window.location.href='career-flow.html?step=page-dreams-intro'">方向選擇</button>
    </div>
  </div>

  <script>
    // 建立塵埃粒子
    function createDustMotes() {
      const container = document.getElementById('dust-motes');
      if (!container) return;
      const moteCount = 15;
      for (let i = 0; i < moteCount; i++) {
        const mote = document.createElement('div');
        mote.classList.add('mote');

        const size = Math.random() * 4 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 15 + 10;
        const delay = Math.random() * -20;

        mote.style.width = `${size}px`;
        mote.style.height = `${size}px`;
        mote.style.left = `${left}vw`;
        mote.style.animationDuration = `${duration}s`;
        mote.style.animationDelay = `${delay}s`;

        container.appendChild(mote);
      }
    }

    window.addEventListener('load', () => {
      createDustMotes();

      // 載入網頁後立即播放淡入動畫
      document.body.classList.add('show-final-text');
      
      // 動態按鈕動畫完全結束後（約 1.3 秒）開放點擊
      setTimeout(() => {
        document.body.classList.add('btns-ready');
      }, 1300);
    });
  </script>
</body>

</html>
