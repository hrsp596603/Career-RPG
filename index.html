<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>撥雲見月 - Sample</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    @font-face {
      font-family: 'Iansui';
      src: url('assets/Iansui-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f2ee;
      /* 使用 subpages 的背景色 */
      font-family: 'Iansui', 'Noto Serif TC', serif;
    }

    /* 模擬的首頁內容 */
    .homepage-mock {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #ffffff 0%, #f4f2ee 100%);
      color: #12151a;

      /* 初始狀態：模糊且稍微暗一點 */
      filter: blur(15px) brightness(0.7);
      transform: scale(1.05);
      transition: filter 4s cubic-bezier(0.3, 0, 0.2, 1), transform 4s cubic-bezier(0.3, 0, 0.2, 1);
    }

    .homepage-mock h1 {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .homepage-mock p {
      font-size: 1.2rem;
      color: #8a8278;
    }

    /* 雲霧容器 */
    .clouds-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* 單片雲霧，替換成真實圖片 */
    .cloud {
      position: absolute;
      background-size: cover;
      /* 讓圖片填滿指定的區域 */
      background-position: center;
      background-repeat: no-repeat;
      /* 放慢動畫至 4 秒，讓雲氣散開更有史詩感 */
      transition: transform 4s cubic-bezier(0.3, 0, 0.2, 1), opacity 4s cubic-bezier(0.3, 0, 0.2, 1);
    }

    /* 佈置 5 片雲，增加大小與中央覆蓋率 */
    .cloud-1 {
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.95;
    }

    .cloud-2 {
      top: -10%;
      right: -10%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.85;
      /* 鏡像翻轉，增加自然感 */
      transform: scaleX(-1);
    }

    .cloud-3 {
      bottom: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.95;
    }

    .cloud-4 {
      bottom: -10%;
      right: -10%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.8;
      /* 上下翻轉 */
      transform: scaleY(-1);
    }

    .cloud-5 {
      top: -15%;
      left: -15%;
      width: 130%;
      height: 130%;
      background-image: url('assets/fog_6.png');
      opacity: 1;
      /* 稍微旋轉填補中央空隙 */
      transform: rotate(15deg);
    }

    /* ====== 動畫觸發後的狀態 ====== */

    /* 首頁變清晰 */
    body.is-clearing .homepage-mock {
      filter: blur(0px) brightness(1);
      transform: scale(1);
    }

    /* 雲霧向四周推移、放大（營造逼近相機後消失的感覺）、並漸漸透明 */
    body.is-clearing .cloud-1 {
      transform: translate(-30%, -30%) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-2 {
      /* 注意：保留原有的 scaleX(-1) 屬性 */
      transform: translate(30%, -30%) scaleX(-1) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-3 {
      transform: translate(-30%, 30%) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-4 {
      /* 注意：保留原有的 scaleY(-1) 屬性 */
      transform: translate(30%, 30%) scaleY(-1) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-5 {
      /* 注意：保留原有的 rotate(15deg) 屬性，並向正上方放大散開 */
      transform: translateY(-20%) scale(1.8) rotate(15deg);
      opacity: 0;
    }

    /* 控制按鈕 */
    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
    }

    .controls button {
      padding: 10px 24px;
      font-size: 16px;
      font-family: inherit;
      background: #12151a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      /* 預設隱藏 */
      visibility: hidden;
      /* 徹底隱藏，不可點擊 */
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    /* 當動畫啟動後，延遲顯示按鈕 */
    body.is-clearing .controls button {
      opacity: 1;
      visibility: visible;
      transition-delay: 2s;
      /* 延遲加快一秒，改為 2 秒 */
    }

    /* 文字切換動畫 */
    .homepage-mock h1,
    .homepage-mock p {
      transition: opacity 1s ease-in-out, filter 1s ease-in-out;
    }

    body.show-final-text .homepage-mock h1,
    body.show-final-text .homepage-mock p {
      opacity: 0;
      filter: blur(10px);
    }

    /* 最終標題文字容器 */
    .final-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      /* 初始不可點擊 */
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
      z-index: 50;
    }

    body.show-final-text .final-content {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      /* 出現後可點擊 */
    }

    .final-content h2 {
      font-size: 5rem;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 30px;
      margin-right: -30px;
      /* 補償 letter-spacing 造成的視覺偏移 */
    }

    .action-buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    /* 進入按鈕樣式 - 新版膠囊按鈕 */
    .action-btn {
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 600;
      font-family: 'Iansui', serif;
      background: #c3eef5;
      /* 圖片中的淺藍色 */
      color: #0c3340;
      /* 配合底色的深藍綠色字體 */
      border: none;
      border-radius: 24px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      /* 初始不可見 */
      pointer-events: none;
      /* 初始不可點擊 */
      transform: translateY(20px);
      transition: opacity 1s ease-out, transform 1s ease-out, background 0.3s, visibility 1s;
    }

    /* 讓按鈕接續出現 */
    body.show-final-text .action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    body.show-final-text .action-btn:nth-child(1) {
      transition-delay: 1.0s;
    }

    body.show-final-text .action-btn:nth-child(2) {
      transition-delay: 1.2s;
    }

    body.show-final-text .action-btn:nth-child(3) {
      transition-delay: 1.4s;
    }

    .action-btn:hover {
      background: #99ddea;
    }

    /* 左上角 Icon 樣式 */
    .site-icon {
      position: absolute;
      top: 0px;
      left: 40px;
      width: 80px;
      /* 控制 icon 大小 */
      height: auto;
      z-index: 60;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      /* 初始不可點擊 */
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    body.show-final-text .site-icon {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      /* 出現後可點擊 */
    }

    /* 強制瞬間重設，不帶動畫 */
    body.no-transition .cloud,
    body.no-transition .homepage-mock,
    body.no-transition .homepage-mock h1,
    body.no-transition .homepage-mock p,
    body.no-transition .final-content,
    body.no-transition .action-btn,
    body.no-transition .site-icon,
    body.no-transition .controls button {
      transition: none !important;
    }
  </style>
</head>

<body>

  <!-- 左上角 Icon -->
  <img src="assets/icon.png" class="site-icon" alt="Career Match Icon">

  <!-- 初始首頁內容 -->
  <div class="homepage-mock">
    <h1>撥雲見月</h1>
    <p>這是一個開場動畫展示範例 (使用真實圖片)</p>
  </div>

  <!-- 最終顯示內容 -->
  <div class="final-content">
    <h2>開 始</h2>
    <div class="action-buttons">
      <button class="action-btn" onclick="window.location.href='flow-pages.html?step=page-want-or-not'">有沒有方向</button>
      <button class="action-btn" onclick="window.location.href='flow-pages.html?step=page-can-or-not'">能力轉譯</button>
      <button class="action-btn" onclick="window.location.href='flow-pages.html?step=page-menu'">方向選擇</button>
    </div>
  </div>

  <!-- 雲霧層 -->
  <div class="clouds-container">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="cloud cloud-5"></div>
  </div>

  <!-- 重播按鈕 -->
  <div class="controls">
    <button onclick="replayAnimation()">重新觀看動畫</button>
  </div>

  <script>
    let textTimer;

    // 啟動動畫序列
    function startSequence() {
      // 0.8秒後開始撥雲
      setTimeout(() => {
        document.body.classList.add('is-clearing');

        // 撥雲開始後 3.5 秒 (總共約 4.3 秒)，切換到最終文字
        textTimer = setTimeout(() => {
          document.body.classList.add('show-final-text');
        }, 3500);
      }, 800);
    }

    window.addEventListener('load', startSequence);

    function replayAnimation() {
      // 清除計時器防止衝突
      clearTimeout(textTimer);

      // 1. 瞬間回到初始狀態
      document.body.classList.add('no-transition');
      document.body.classList.remove('is-clearing');
      document.body.classList.remove('show-final-text');

      void document.body.offsetHeight;
      document.body.classList.remove('no-transition');

      // 2. 重新啟動序列
      setTimeout(startSequence, 50);
    }
  </script>
</body>

</html>
