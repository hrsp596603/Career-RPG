<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初路 - 初級大人的職業探索之路</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    /* ===== 品牌色票 ===== */
    :root {
      --s10: #FAF6F3;   /* 靜白・背景主色 */
      --s30: #F2DFD3;   /* 奶霧粉・品牌主色 */
      --s40: #E8D5C7;   /* 淡燕麥・邊框 */
      --s50: #D4A898;   /* 舊珊瑚・強調色 */
      --n50: #2C2A26;   /* 碳墨・主文字 */
      --n40: #4A3E38;   /* 深土・副標題 */
      --n30: #8C7B72;   /* 木煙・輔助文字 */
      --a20: #A8B498;   /* 霧綠・確認狀態 */
    }

    @font-face {
      font-family: 'Iansui';
      src: url('assets/Iansui-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--s10);
      font-family: 'Iansui', 'Noto Serif TC', serif;
      color: var(--n50);
    }

    /* 首頁背景底圖 */
    .homepage-mock {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* 品牌靜白 overlay (25%) 淡化背景圖，保留底紋質感 */
      background: linear-gradient(
        rgba(250, 246, 243, 0.25),
        rgba(250, 246, 243, 0.25)
      ), url('assets/abanner.png') center/cover no-repeat;
      color: var(--n50);
    }

    /* 最終顯示內容容器 */
    .final-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
      z-index: 50;
    }

    body.show-final-text .final-content {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .title-wrapper {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.show-final-text .final-content .title-wrapper {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      animation: gentleFadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
      animation-delay: 0.4s;
    }

    .final-content h2 {
      font-size: 6.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 30px;
      margin-right: -30px;
      text-wrap: balance;
      
      /* 品牌色：N50 碳墨 → N40 深土 漸層 */
      background: linear-gradient(135deg, var(--n50) 0%, var(--n40) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      
      /* 以 S10 靜白柔光托底，取代刺眼的純白光暈 */
      filter: drop-shadow(0 0 12px rgba(250, 246, 243, 0.9)) 
              drop-shadow(0 4px 20px rgba(250, 246, 243, 0.6));
    }

    .final-subtitle {
      font-size: 1.25rem;
      font-weight: 600;
      /* 品牌色 N40 深土 作為副標題色，對比清晰且溫潤 */
      color: var(--n40);
      letter-spacing: 8px;
      margin-right: -8px;
      margin-top: 0;
      margin-bottom: 48px;
      text-wrap: balance;
      
      /* 以 S10 靜白作為文字的柔和光暈底色 */
      text-shadow: 0 2px 10px rgba(250, 246, 243, 0.95), 
                   0 1px 4px rgba(250, 246, 243, 0.85);
      
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.show-final-text .final-subtitle {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      animation: gentleFadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
      animation-delay: 0.55s;
    }

    .action-buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    @keyframes gentleFadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 進入按鈕樣式 - 品牌引導風格 */
    .action-btn {
      padding: 16px 32px;
      font-size: 1.125rem;
      font-weight: 600;
      font-family: 'Iansui', serif;
      /* S50 舊珊瑚 底色，S10 靜白 文字 */
      background: var(--s50);
      color: var(--s10);
      border: none;
      border-radius: 24px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      box-shadow: 0 4px 12px rgba(212, 168, 152, 0.3);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    /* 讓按鈕接續出現 */
    body.show-final-text .action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: none;
      animation: gentleFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }

    /* 動畫完全結束後才允許點擊 */
    body.btns-ready .action-btn {
      pointer-events: auto;
    }

    body.btns-ready .action-btn:hover {
      background: #C39787;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(212, 168, 152, 0.45);
    }

    body.btns-ready .action-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 4px rgba(212, 168, 152, 0.25);
    }

    body.show-final-text .action-btn:nth-child(1) {
      animation-delay: 0.7s;
    }

    body.show-final-text .action-btn:nth-child(2) {
      animation-delay: 0.85s;
    }

    /* 左上角 Icon 樣式 */
    .site-icon {
      position: absolute;
      top: 20px;
      left: 40px;
      width: 80px;
      height: auto;
      z-index: 60;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    body.show-final-text .site-icon {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* 紙張紋理 */
    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.06;
      mix-blend-mode: multiply;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }

    /* 塵埃粒子 */
    .dust-motes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 25;
      overflow: hidden;
    }

    .mote {
      position: absolute;
      background: rgba(250, 246, 243, 0.85);
      border-radius: 50%;
      filter: blur(1.5px);
      animation: floatUp linear infinite;
      box-shadow: 0 0 4px rgba(250, 246, 243, 0.7);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* ===== 開場動畫 Overlay ===== */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #E8E2DB; /* 與影片背景色接近，避免閃白 */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease-in-out;
    }

    #intro-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== 手機開場動畫 Overlay（純 CSS/JS 漣漪動畫）===== */
    #mobile-intro {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: var(--s10);
      display: none; /* 由 JS 依裝置分流顯示 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.7s ease-in-out;
    }

    #mobile-intro.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Canvas 漣漪層 */
    #ripple-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* 水滴本體：透明水質感 */
    #mi-drop {
      position: absolute;
      width: 9px;
      height: 13px;
      /* 雙層漸層：白色高光點 + 極淡珊瑚主體 */
      background:
        radial-gradient(ellipse 30% 35% at 38% 26%,
          rgba(255,255,255,0.60) 0%,
          rgba(255,255,255,0.00) 65%),
        radial-gradient(ellipse 75% 88% at 50% 58%,
          rgba(212,168,152,0.22) 0%,
          rgba(200,155,135,0.06) 100%);
      border-radius: 50% 50% 55% 55% / 44% 44% 66% 66%;
      left: 50%;
      top: -24px;
      transform: translateX(-50%) scale(1);
      transform-origin: center center;
      z-index: 30;
      opacity: 0;
      filter: blur(1.2px);
      will-change: transform, opacity;
    }

    /* LOGO 組合容器 */
    #mi-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
    }

    #mi-logo-icon {
      width: 108px;
      height: 108px;
      margin-bottom: 22px;
      filter: drop-shadow(0 0 18px rgba(250,246,243,0.85));
    }

    #mi-logo-title {
      font-family: 'Iansui', 'Noto Serif TC', serif;
      font-size: 3rem;
      font-weight: 600;
      letter-spacing: 18px;
      margin-right: -18px;
      color: var(--n50);
      line-height: 1;
      margin-bottom: 14px;
      text-shadow:
        0 0 20px rgba(250,246,243,0.95),
        0 2px 8px rgba(250,246,243,0.7);
    }

    #mi-logo-sub {
      font-family: 'Iansui', 'Noto Serif TC', serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 4px;
      margin-right: -4px;
      color: var(--n40);
      text-shadow: 0 1px 6px rgba(250,246,243,0.9);
    }

    /* 中心光暈 */
    #mi-halo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(242,223,211,0.55) 0%, transparent 70%);
      z-index: 15;
      opacity: 0;
      pointer-events: none;
    }

    /* 消散遮罩（讓 LOGO 從白霧中浮現）*/
    #mi-reveal {
      position: absolute;
      inset: 0;
      background: var(--s10);
      z-index: 25;
      opacity: 1;
      pointer-events: none;
    }

    /* 手機版塵埃粒子 */
    #mi-motes .mi-mote {
      position: absolute;
      background: rgba(212,168,152,0.55);
      border-radius: 50%;
      filter: blur(1px);
      animation: miFloat linear infinite;
      pointer-events: none;
      z-index: 6;
    }

    @keyframes miFloat {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      15%  { opacity: 0.65; }
      85%  { opacity: 0.35; }
      100% { transform: translateY(-20px) scale(1.1); opacity: 0; }
    }

    /* ===== 行動端響應式調整 ===== */
    @media (max-width: 768px) {
      .final-content h2 {
        font-size: 3.5rem; /* 縮小標題字型，防止在手機上折行 */
        letter-spacing: 15px; /* 縮小字距 */
        margin-right: -15px;
      }
      .final-subtitle {
        font-size: 1.1rem;
        letter-spacing: 4px;
        margin-right: -4px;
        margin-bottom: 32px;
      }
      .action-buttons {
        flex-direction: row; /* 確保按鈕維持水平排列 */
        gap: 16px;
      }
      .action-btn {
        padding: 12px 24px; /* 減少內邊距以適應手機寬度 */
        font-size: 0.95rem;
        white-space: nowrap; /* 強制按鈕文字不折行 */
      }
    }
  </style>
</head>

<body>

  <!-- 開場動畫 Overlay (預設隱藏，由 JS 針對電腦版動態載入影片，防止手機版殘影與流量消耗) -->
  <div id="intro-overlay" style="display: none;"></div>

  <!-- 環境裝飾元素 -->
  <div class="noise-overlay"></div>

  <div class="dust-motes" id="dust-motes"></div>

  <!-- 左上角 Icon -->
  <img src="assets/icon.png" class="site-icon" alt="Career Match Icon">

  <!-- 初始首頁背景 (清晰背景) -->
  <div class="homepage-mock"></div>

  <!-- 手機開場動畫 Overlay（純 CSS/JS 動畫）-->
  <div id="mobile-intro">
    <canvas id="ripple-canvas"></canvas>
    <div id="mi-halo"></div>
    <div id="mi-reveal"></div>
    <div id="mi-drop"></div>
    <div id="mi-logo">
      <!-- SVG 忠實複刻 icon.png 的雙層拱門 -->
      <svg id="mi-logo-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="mi-paper" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="4" result="noise" seed="3"/>
            <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
            <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
            <feComposite in="blended" in2="SourceGraphic" operator="in"/>
          </filter>
        </defs>
        <!-- 外層大拱門 -->
        <path d="M 28,175 L 28,102 Q 28,30 100,30 Q 172,30 172,102 L 172,175"
              fill="none" stroke="#3D3530" stroke-width="26" stroke-linecap="round"
              filter="url(#mi-paper)"/>
        <!-- 內層小拱門 -->
        <path d="M 68,175 L 68,114 Q 68,74 100,74 Q 132,74 132,114 L 132,175"
              fill="none" stroke="#3D3530" stroke-width="22" stroke-linecap="round"
              filter="url(#mi-paper)"/>
      </svg>
      <div id="mi-logo-title">初路</div>
      <div id="mi-logo-sub">初級大人的探索之路</div>
    </div>
    <div id="mi-motes"></div>
  </div>

  <!-- 最終顯示內容 (主標題與副標題，一進來便自動淡入) -->
  <div class="final-content">
    <div class="title-wrapper">
      <h2>初路</h2>
    </div>
    <p class="final-subtitle">初級大人的探索之路</p>
    <div class="action-buttons">
      <button class="action-btn" onclick="window.location.href='career-flow.html?step=start'">背景建構</button>
      <button class="action-btn" onclick="window.location.href='career-flow.html?step=page-dreams-intro'">方向選擇</button>
    </div>
  </div>

  <script>
    // 建立環境塵埃粒子
    function createDustMotes() {
      const container = document.getElementById('dust-motes');
      if (!container) return;
      const moteCount = 15;
      for (let i = 0; i < moteCount; i++) {
        const mote = document.createElement('div');
        mote.classList.add('mote');
        const size = Math.random() * 4 + 2;
        mote.style.width = `${size}px`;
        mote.style.height = `${size}px`;
        mote.style.left = `${Math.random() * 100}vw`;
        mote.style.animationDuration = `${Math.random() * 15 + 10}s`;
        mote.style.animationDelay = `${Math.random() * -20}s`;
        container.appendChild(mote);
      }
    }

    // 影片與動畫結束後共同調用：進入主畫面
    function enterMainContent(overlayId) {
      const overlay = document.getElementById(overlayId || 'intro-overlay');
      if (!overlay) return;
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.remove(), 700);
      document.body.classList.add('show-final-text');
      setTimeout(() => document.body.classList.add('btns-ready'), 1300);
    }

    /* ======================================================
       手機版專屬：Canvas 漣漪動畫與流程控制 (精準對齊 4 秒)
     ====================================================== */
    function isMobile() {
      return window.matchMedia('(max-width: 768px)').matches ||
             ('ontouchstart' in window && window.innerWidth <= 900);
    }

    // -- 手機版塵埃粒子 --
    function spawnMiMotes() {
      const c = document.getElementById('mi-motes');
      if (!c) return;
      for (let i = 0; i < 14; i++) {
        const m = document.createElement('div');
        m.classList.add('mi-mote');
        const sz = Math.random() * 3 + 1.5;
        m.style.cssText = [
          'width:' + sz + 'px',
          'height:' + sz + 'px',
          'left:' + (Math.random()*100) + '%',
          'animation-duration:' + (Math.random()*12+8) + 's',
          'animation-delay:' + (Math.random()*-15) + 's'
        ].join(';');
        c.appendChild(m);
      }
    }

    function initRippleCanvas() {
      const canvas = document.getElementById('ripple-canvas');
      const rect = canvas.getBoundingClientRect();
      canvas.width  = rect.width || window.innerWidth;
      canvas.height = rect.height || window.innerHeight;
      const ctx = canvas.getContext('2d');
      const ripples = [];

      function addRipple(x, y, maxR, speed, alpha, color) {
        ripples.push({ x, y, r: 24, maxR, speed, alpha, color, done: false });
      }

      function drawRipples() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ripples.forEach(rp => {
          if (rp.done) return;
          const progress = Math.min(1.0, rp.r / rp.maxR);
          const opacity  = rp.alpha * (1 - progress);
          if (opacity > 0.002) {
            ctx.beginPath();
            ctx.ellipse(rp.x, rp.y, rp.r * 1.20, rp.r * 0.65, 0, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(' + rp.color + ',' + opacity.toFixed(3) + ')';
            ctx.lineWidth   = 1.2 + 2.8 * (1 - progress);
            ctx.stroke();
          }
          rp.r += rp.speed;
          if (opacity <= 0.002 || rp.r >= rp.maxR) {
            rp.done = true;
          }
        });
        requestAnimationFrame(drawRipples);
      }

      const W  = canvas.width;
      const H  = canvas.height;
      const CX = W / 2;

      async function playMobileIntro() {
        spawnMiMotes();
        requestAnimationFrame(drawRipples);

        const drop   = document.getElementById('mi-drop');
        const logo   = document.getElementById('mi-logo');
        const halo   = document.getElementById('mi-halo');
        const reveal = document.getElementById('mi-reveal');

        const wait    = ms => new Promise(r => setTimeout(r, ms));
        const easeOut = t => 1 - Math.pow(1 - t, 3);

        // 1. 靜止蓄力 (調整至 400ms，建立期待感)
        await wait(400);

        // 2. 水滴落下 (重力加速度改回 0.63，下墜約耗時 300ms，前兩階段到撞擊共 0.7s)
        const DROP_END = H * 0.49;
        const DROP_PCT = ((DROP_END / H) * 100).toFixed(2) + '%';

        await new Promise(resolve => {
          let y = -24, vy = 0;
          drop.style.opacity = '1';
          function fall() {
            vy += 0.63;
            y  += vy;
            drop.style.top = y + 'px';
            if (y >= DROP_END) {
              resolve(); // 撞擊瞬間：立刻回傳啟動漣漪與遮罩，消除空白

              // 異步執行水滴飛濺消失
              const SPLASH_DUR = 220;
              const splashStart = performance.now();
              function splash(now) {
                const st = Math.min((now - splashStart) / SPLASH_DUR, 1);
                const sc = 1 + st * 1.8;
                const op = (1 - st).toFixed(3);
                drop.style.transform = 'translateX(-50%) scale(' + sc + ')';
                drop.style.opacity   = op;
                if (st < 1) requestAnimationFrame(splash);
              }
              requestAnimationFrame(splash);
            } else {
              requestAnimationFrame(fall);
            }
          }
          fall();
        });

        // 3. IMPACT：3 波漣漪無延遲同步啟動，使用品牌暖色系（溫潤奶茶棕與舊珊瑚色），兼顧清晰度與柔和質感
        const waves = [
          { delay: 0, maxR: 120, speed: 1.2, alpha: 0.65, color: '180,130,110' }, // 第一波：重擊中心圈，溫潤奶茶棕
          { delay: 0, maxR: 280, speed: 3.5, alpha: 0.45, color: '180,130,110' }, // 第二波：中圈，溫潤奶茶棕
          { delay: 0, maxR: Math.max(W, H) * 0.85, speed: 5.5, alpha: 0.25, color: '212,168,152' }, // 第三波：外大圈，品牌舊珊瑚色
        ];
        waves.forEach(w => setTimeout(() =>
          addRipple(CX, DROP_END, w.maxR, w.speed, w.alpha, w.color), w.delay));

        // 4. 遮罩消散
        const REVEAL_DUR  = 1800;  
        const revealStart = performance.now();
        const easeInOut   = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t; 

        function animateReveal(now) {
          const t = Math.min((now - revealStart) / REVEAL_DUR, 1);
          const e = easeInOut(t);              
          const r    = (e * 158).toFixed(2);  
          const edge = (e * 158 + 4).toFixed(2);
          const m = 'radial-gradient(circle at 50% ' + DROP_PCT +
                    ', transparent ' + r + '%, #FAF6F3 ' + edge + '%)';
          reveal.style.webkitMaskImage = m;
          reveal.style.maskImage       = m;
          if (t < 1) requestAnimationFrame(animateReveal);
          else reveal.style.display = 'none';
        }
        requestAnimationFrame(animateReveal);

        // 5. LOGO 淡入 (延長延遲至 1200ms (1.2秒) 讓漣漪充分擴散，淡入時長維持 1200ms)
        await wait(1200);
        const LOGO_DUR  = 1200;
        const logoStart = performance.now();
        function animateLogo(now) {
          const t = Math.min((now - logoStart) / LOGO_DUR, 1);
          const e = easeOut(t);
          logo.style.opacity = e.toFixed(4);
          halo.style.opacity = (e * 0.70).toFixed(4);
          if (t < 1) requestAnimationFrame(animateLogo);
        }
        requestAnimationFrame(animateLogo);

        // 6. 固定對齊：前半段 0.7s + 後半段（1.2s LOGO延遲 + 1.75s 固定等待 = 2.95s） = 3.65s (3.65秒) 啟動轉場淡出，4.0 秒時無縫銜接首頁
        await wait(1750);
        enterMainContent('mobile-intro');
      }

      playMobileIntro();
    }

    // -- 載入分流與初始化 --
    window.addEventListener('load', () => {
      createDustMotes();

      if (isMobile()) {
        // --- 行動端：直接移除（remove）桌機影片 Overlay，防止底圖殘影干擾 ---
        const videoOverlay = document.getElementById('intro-overlay');
        if (videoOverlay) videoOverlay.remove();
        
        const mobileOverlay = document.getElementById('mobile-intro');
        if (mobileOverlay) mobileOverlay.style.display = 'flex';
        
        initRippleCanvas();
      } else {
        // --- 桌面端：顯示 overlay，並動態插入影片播放 ---
        const mobileOverlay = document.getElementById('mobile-intro');
        if (mobileOverlay) mobileOverlay.remove();
        
        const videoOverlay = document.getElementById('intro-overlay');
        if (videoOverlay) {
          videoOverlay.style.display = 'flex';
          videoOverlay.innerHTML = `
            <video id="intro-video" autoplay muted playsinline preload="auto">
              <source src="assets/開場.mp4" type="video/mp4">
            </video>
          `;
          
          const video = document.getElementById('intro-video');
          if (video) {
            video.addEventListener('ended', () => enterMainContent('intro-overlay'));
            video.addEventListener('error', () => {
              console.warn('開場影片載入失敗，直接進入主畫面。');
              enterMainContent('intro-overlay');
            });
          }
        }
      }
    });
  </script>
</body>

</html>
