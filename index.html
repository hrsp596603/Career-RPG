<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職涯圖鑑 — Career RPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --ink: #12151a;
    --paper: #f4f2ee;
    --muted: #8a8278;
    --light: #e8e4dc;
    --warn: #9a3a3a;

    /* Job colors */
    --j1: #4a5a9a;   /* 職涯諮詢師 — blue */
    --j1bg: rgba(74,90,154,0.04);
    --j2: #3a6b4a;   /* 資優班老師 — green */
    --j2bg: rgba(58,107,74,0.04);
    --j3: #7a3a7a;   /* 心理諮商師 — purple */
    --j3bg: rgba(122,58,122,0.04);

    --gold: #8a7a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── NAV ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 24px;
    height: 48px;
    overflow-x: auto;
  }

  .nav-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
    white-space: nowrap;
    margin-right: 24px;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    gap: 0;
    flex-shrink: 0;
  }

  .nav-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s, border-bottom 0.2s;
    text-decoration: none;
    color: var(--paper);
    white-space: nowrap;
    border-bottom: 2px solid transparent;
  }

  .nav-link:hover { opacity: 1; }
  .nav-link.j1 { border-bottom-color: var(--j1); opacity: 1; }
  .nav-link.j2 { border-bottom-color: var(--j2); opacity: 1; }
  .nav-link.j3 { border-bottom-color: var(--j3); opacity: 1; }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 56px 24px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .page-header .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
  }

  .page-header h1 {
    font-size: clamp(32px, 6vw, 58px);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1.05;
    margin-bottom: 16px;
  }

  .page-header .sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 520px;
  }

  /* ── JOB SECTION ── */
  .job-section {
    padding: 60px 24px 80px;
    max-width: 900px;
    margin: 0 auto;
    border-top: 2px solid var(--ink);
    scroll-margin-top: 48px;
  }

  .job-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }

  .job-color-bar {
    width: 4px;
    height: 80px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .job-header-text {}

  .job-number {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .job-title {
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.05;
    margin-bottom: 8px;
  }

  .job-en {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── CARD ── */
  .card {
    background: white;
    border: 1.5px solid var(--ink);
    margin-bottom: 24px;
    position: relative;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: -4px; bottom: -4px;
    border: 1.5px solid var(--ink);
    z-index: -1;
  }

  .card-header {
    background: var(--ink);
    color: var(--paper);
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-header h2 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .card-header .sub {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    opacity: 0.4;
    letter-spacing: 1px;
  }

  /* 擴增收合相關控制樣式 */
  .card-header {
    cursor: pointer;
    user-select: none;
    transition: filter 0.2s ease;
  }
  .card-header:hover {
    filter: brightness(1.2);
  }
  .card-header::after {
    content: '▼';
    margin-left: 14px;
    font-size: 10px;
    font-weight: 700;
    opacity: 0.6;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.open .card-header::after {
    transform: rotate(-180deg);
  }
  .card-body-wrapper {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.open .card-body-wrapper {
    grid-template-rows: 1fr;
  }
  .card-body-inner {
    overflow: hidden;
  }

  .card-body { padding: 24px; }

  /* ── OVERVIEW ── */
  .overview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }

  @media (max-width: 600px) { .overview-grid { grid-template-columns: 1fr; } }

  .overview-desc {
    font-size: 14px;
    line-height: 1.9;
    color: #2a2530;
  }

  .overview-note {
    margin-top: 14px;
    padding: 11px 14px;
    font-size: 12px;
    line-height: 1.8;
  }

  .stats { display: flex; flex-direction: column; gap: 12px; }

  .stat-row { display: flex; flex-direction: column; gap: 3px; }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .stat-label .val { font-weight: 700; }

  .stat-bar {
    height: 5px;
    background: var(--light);
    border: 1px solid rgba(0,0,0,0.07);
    overflow: hidden;
  }

  .stat-fill { height: 100%; }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .skill {
    border: 1px solid var(--ink);
    padding: 14px;
    position: relative;
  }

  .skill.core {}
  .skill.burden { border-color: var(--warn); background: rgba(154,58,58,0.02); }
  .skill.self {}

  .skill-name { font-weight: 600; font-size: 13px; margin-bottom: 5px; }
  .skill-desc { font-size: 11px; color: var(--muted); line-height: 1.7; }

  .skill-lv {
    position: absolute;
    top: 10px; right: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
  }

  /* ── ROUTES ── */
  .route { border: 1.5px solid var(--ink); margin-bottom: 18px; }
  .route:last-child { margin-bottom: 0; }

  .route-header {
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--ink);
  }

  .rbadge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border: 1px solid currentColor;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .route-name { font-weight: 600; font-size: 14px; }

  .route-ceil {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .route-body { padding: 18px; }

  .stages { display: flex; flex-direction: column; position: relative; }

  .stages::before {
    content: '';
    position: absolute;
    left: 13px; top: 26px; bottom: 26px;
    width: 1px;
    background: var(--ink);
    opacity: 0.12;
  }

  .stage { display: flex; gap: 18px; padding: 10px 0; }

  .dot {
    width: 26px; height: 26px;
    border: 2px solid var(--ink);
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px; font-weight: 700;
    flex-shrink: 0; z-index: 1;
  }

  .dot.filled { background: var(--ink); color: var(--paper); }
  .dot.col { color: white; }

  .stage-content { flex: 1; padding-top: 3px; }
  .stage-title { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
  .stage-desc { font-size: 11px; color: var(--muted); line-height: 1.8; margin-bottom: 7px; }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 1px 7px;
    background: var(--light);
    border: 1px solid rgba(0,0,0,0.09);
  }

  .tag.gate { background: rgba(74,90,154,0.08); border-color: rgba(74,90,154,0.2); color: var(--j1); }
  .tag.warn { background: rgba(154,58,58,0.07); border-color: rgba(154,58,58,0.18); color: var(--warn); }

  /* ── CROSSROADS ── */
  .crossroad {
    border: 1.5px solid;
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
  }

  .crossroad::before {
    content: '⚑';
    position: absolute;
    top: -10px; left: 18px;
    background: white;
    padding: 0 5px;
    font-size: 13px;
  }

  .crossroad:last-child { margin-bottom: 0; }

  .cq { font-weight: 600; font-size: 14px; margin-bottom: 12px; }

  .copts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 500px) { .copts { grid-template-columns: 1fr; } }

  .copt { border: 1px solid var(--ink); padding: 11px; }
  .copt-lbl { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; display: block; }
  .copt-name { font-weight: 600; font-size: 12px; margin-bottom: 5px; }
  .copt-desc { font-size: 11px; color: var(--muted); line-height: 1.7; }

  /* ── BOSSES ── */
  .boss-list { display: flex; flex-direction: column; gap: 10px; }

  .boss {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 12px; border: 1px solid rgba(0,0,0,0.09);
  }

  .boss-icon { font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; padding-top: 1px; }
  .boss-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
  .boss-desc { font-size: 11px; color: var(--muted); line-height: 1.7; }

  /* ── COMPARE ── */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--ink);
  }

  @media (max-width: 560px) { .compare-grid { grid-template-columns: 1fr; } }

  .compare-col { padding: 18px; }
  .compare-col:first-child { border-right: 1px solid var(--ink); }

  .compare-col-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 7px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    font-weight: 700;
  }

  .compare-item {
    font-size: 11px;
    line-height: 1.8;
    color: var(--muted);
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .compare-item:last-child { border-bottom: none; }
  .compare-item strong { color: var(--ink); font-weight: 600; display: block; font-size: 11px; }

  /* ── HIDDEN ── */
  .hidden-list { display: flex; flex-direction: column; gap: 10px; }

  .hidden {
    border: 1px dashed var(--gold);
    padding: 14px 18px;
    background: rgba(138,122,58,0.03);
  }

  .hidden-lbl {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 5px;
    display: block;
  }

  .hidden-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .hidden-desc { font-size: 11px; color: var(--muted); line-height: 1.8; }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0 18px;
  }

  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: var(--ink); opacity: 0.1;
  }

  .divider span {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 28px 24px;
    border-top: 1px solid rgba(0,0,0,0.1);
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── INDEX CARD ── */
  .index {
    padding: 40px 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  .index-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 600px) { .index-grid { grid-template-columns: 1fr; } }

  .index-card {
    border: 1.5px solid var(--ink);
    padding: 20px;
    cursor: pointer;
    text-decoration: none;
    color: var(--ink);
    display: block;
    position: relative;
    transition: transform 0.15s;
  }

  .index-card:hover { transform: translate(-2px, -2px); }

  .index-card::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: -4px; bottom: -4px;
    border: 1.5px solid var(--ink);
    z-index: -1;
  }

  .index-card .ic-num {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .index-card .ic-title {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .index-card .ic-bar {
    height: 3px;
    margin-bottom: 12px;
  }

  .index-card .ic-q {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }

</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <span class="nav-title" style="cursor: pointer;" onclick="window.location.href='index.html'" title="回到首頁">Career RPG</span>
  <div class="nav-links">
    <a href="subpages.html#j1" class="nav-link j1" style="border-bottom-color:var(--j1)">01 · 職涯諮詢師</a>
    <a href="subpages.html#j2" class="nav-link j2" style="border-bottom-color:var(--j2)">02 · 資優班老師</a>
    <a href="subpages.html#j3" class="nav-link j3" style="border-bottom-color:var(--j3)">03 · 心理諮商師</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <span class="label">Career RPG · 職涯模擬系統 · v0.1</span>
  <h1>職涯圖鑑</h1>
  <p class="sub">這不是要替你做決定。是讓你在點菜之前，先知道這道菜大概的輪廓、地雷在哪、廚房的邏輯是什麼。</p>
</div>



<div class="footer">
  Career RPG · 職涯模擬系統 · v0.1 · 這不是標準答案，是讓你帶著更好的問題去點菜。
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.card').forEach(card => {
      const header = card.querySelector('.card-header');
      const body = card.querySelector('.card-body');
      
      if (header && body) {
        // Create an animated wrapper to hold the body
        const wrapper = document.createElement('div');
        wrapper.className = 'card-body-wrapper';
        const inner = document.createElement('div');
        inner.className = 'card-body-inner';
        
        // Wrap the card-body
        card.insertBefore(wrapper, body);
        wrapper.appendChild(inner);
        inner.appendChild(body);

        header.addEventListener('click', () => {
          card.classList.toggle('open');
        });
      }
    });
  });
</script>

</body>
</html>
